<!DOCTYPE html>
<html lang="ru">
{% extends "layout.html" %}
{% block content %}
<div class="max-w-sm mx-auto bg-gray-800 rounded-xl p-4 shadow-lg compact-form">
    <!-- Заголовок -->
    <div class="text-center mb-4">
        <h2 class="text-xl font-bold text-white mb-2">Вход в систему</h2>
        <p class="text-gray-400 text-sm">Введите ваши учетные данные</p>
    </div>
    <!-- Форма входа -->
    <form id="loginForm" class="space-y-3">
        <!-- Поле Email -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-300 mb-1 text-center">
                Email
            </label>
            <input 
                type="email" 
                id="email" 
                required
                placeholder="ваш@email.com"
                class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm text-center focus:outline-none focus:ring-1 focus:ring-blue-500"
            >
        </div>
        <!-- Поле Пароль -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-300 mb-1 text-center">
                Пароль
            </label>
            <input 
                type="password" 
                id="password" 
                required
                placeholder="••••••••"
                class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm text-center focus:outline-none focus:ring-1 focus:ring-blue-500"
            >
        </div>
        <!-- Сообщение об ошибке -->
        <div id="errorMessage" class="hidden p-2 bg-red-900 text-red-100 rounded text-center text-xs"></div>
        <!-- Кнопка входа -->
        <div class="pt-2">
            <button 
                type="button"
                id="loginButton"
                class="w-full py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-bold rounded-lg hover:opacity-90 transition-all"
            >
                ВОЙТИ
            </button>
        </div>
    </form>
    <!-- Ссылка на регистрацию -->
    <div class="mt-4 text-center">
        <p class="text-gray-400 text-sm">
            Нет аккаунта? 
            <a href="/register" class="text-blue-400 hover:text-blue-300 font-medium text-sm">
                Зарегистрироваться
            </a>
        </p>
    </div>
</div>
<script>
document.getElementById('loginButton').addEventListener('click', async function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.classList.add('hidden');
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });
        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            const errorData = await response.json();
            errorDiv.textContent = errorData.detail || 'Ошибка входа';
            errorDiv.classList.remove('hidden');
        }
    } catch (error) {
        errorDiv.textContent = 'Сетевая ошибка: ' + error.message;
        errorDiv.classList.remove('hidden');
    }
});
</script>
{% endblock %}
