<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front end & Back end</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .nav-tab {
            padding: 8px 12px;
            color: #cbd5e1;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-tab:hover {
            color: white;
            border-bottom-color: #3b82f6;
        }
        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        .hero-subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
            overflow: hidden;
        }
        .compact-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <!-- Верхняя панель навигации -->
    <header class="border-b border-gray-800 flex-shrink-0">
        <div class="container mx-auto px-2">
            <div class="flex justify-center space-x-2 py-2 overflow-x-auto">
                <a href="/services" class="nav-tab">Услуги</a>
                <a href="/pricing" class="nav-tab">Цены и сроки</a>
                <a href="/contacts" class="nav-tab">Контакты</a>
                <a href="/register" class="nav-tab">Регистрация</a>
                <a href="/login" class="nav-tab">Вход</a>
            </div>
        </div>
    </header>
    <!-- Основной контент -->
    <div class="main-content">
        <!-- Центральный заголовок -->
        <div class="text-center mb-3">
            <h1 class="hero-title">Front end & Back end</h1>
            <p class="hero-subtitle">Разработка ИИ решений под ключ</p>
        </div>
        <div class="compact-container">
            {% block content %}{% endblock %}
        </div>
    </div>
    <!-- Футер -->
    <footer class="border-t border-gray-800 py-2 flex-shrink-0">
        <div class="container mx-auto px-2 text-center text-gray-500 text-xs">
            <p>© 2024 Front end & Back end. Все права защищены.</p>
            <p class="mt-0.5">Разработка ИИ решений под ключ</p>
        </div>
    </footer>
</body>
</html>
